<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payroll System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f4f4;
    }
    h1 {
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: left;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    input, button {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }
    .form-group {
      margin-bottom: 10px;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 5px;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Payroll System</h1>

    <h2>Add / Update Employee</h2>
    <form id="employeeForm">
      <div class="form-group">
        <label for="id">Employee ID</label>
        <input type="text" id="id" required />
      </div>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" required />
      </div>
      <div class="form-group">
        <label for="salary">Salary</label>
        <input type="number" id="salary" required />
      </div>
      <div class="form-group">
        <label for="taxRate">Tax Rate (decimal)</label>
        <input type="number" step="0.01" id="taxRate" required />
      </div>
      <div class="form-group">
        <label for="deductions">Deductions</label>
        <input type="number" id="deductions" required />
      </div>
      <div class="form-group">
        <label for="bonuses">Bonuses</label>
        <input type="number" id="bonuses" required />
      </div>
      <div class="form-group">
        <label for="accountNumber">Account Number</label>
        <input type="text" id="accountNumber" />
      </div>
      <div class="form-group">
        <label for="routingNumber">Routing Number</label>
        <input type="text" id="routingNumber" />
      </div>
      <button type="submit">Add / Update Employee</button>
    </form>
    <div id="formMessage" class="message"></div>

    <h2>Employees</h2>
    <table id="employeesTable">
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Salary</th><th>Tax Rate</th><th>Deductions</th><th>Bonuses</th><th>Account Number</th><th>Routing Number</th><th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Process Payroll</h2>
    <button id="processPayrollBtn">Process Payroll for Today</button>
    <div id="payrollResult" class="message"></div>

    <h2>Payroll Records</h2>
    <table id="payrollTable">
      <thead>
        <tr>
          <th>Employee ID</th><th>Gross Pay</th><th>Tax Amount</th><th>Deductions</th><th>Bonuses</th><th>Net Pay</th><th>Pay Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const employeesTableBody = document.querySelector('#employeesTable tbody');
    const payrollTableBody = document.querySelector('#payrollTable tbody');
    const formMessage = document.getElementById('formMessage');
    const payrollResult = document.getElementById('payrollResult');

    async function fetchEmployees() {
      const res = await fetch('/api/payroll/employees');
      if (res.ok) {
        const employees = await res.json();
        renderEmployees(employees);
      }
    }

    function renderEmployees(employees) {
      employeesTableBody.innerHTML = '';
      employees.forEach(emp => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${emp.id}</td>
          <td>${emp.name}</td>
          <td>${emp.salary}</td>
          <td>${emp.taxRate}</td>
          <td>${emp.deductions}</td>
          <td>${emp.bonuses}</td>
          <td>${emp.accountNumber || ''}</td>
          <td>${emp.routingNumber || ''}</td>
          <td>
            <button onclick="deleteEmployee('${emp.id}')">Delete</button>
          </td>
        `;
        employeesTableBody.appendChild(tr);
      });
    }

    async function deleteEmployee(id) {
      const res = await fetch(\`/api/payroll/employees/\${id}\`, { method: 'DELETE' });
      if (res.ok) {
        formMessage.textContent = 'Employee deleted successfully';
        fetchEmployees();
      } else {
        formMessage.textContent = 'Failed to delete employee';
      }
    }

    document.getElementById('employeeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      formMessage.textContent = '';
      const employee = {
        id: document.getElementById('id').value.trim(),
        name: document.getElementById('name').value.trim(),
        salary: parseFloat(document.getElementById('salary').value),
        taxRate: parseFloat(document.getElementById('taxRate').value),
        deductions: parseFloat(document.getElementById('deductions').value),
        bonuses: parseFloat(document.getElementById('bonuses').value),
        accountNumber: document.getElementById('accountNumber').value.trim(),
        routingNumber: document.getElementById('routingNumber').value.trim(),
      };
      const res = await fetch('/api/payroll/employees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(employee),
      });
      if (res.ok) {
        formMessage.textContent = 'Employee added/updated successfully';
        fetchEmployees();
      } else {
        formMessage.textContent = 'Failed to add/update employee';
      }
    });

    document.getElementById('processPayrollBtn').addEventListener('click', async () => {
      payrollResult.textContent = '';
      const res = await fetch('/api/payroll/process', { method: 'POST' });
      if (res.ok) {
        const payrolls = await res.json();
        payrollResult.textContent = 'Payroll processed successfully';
        renderPayrollRecords(payrolls);
      } else {
        payrollResult.textContent = 'Failed to process payroll';
      }
    });

    function renderPayrollRecords(records) {
      payrollTableBody.innerHTML = '';
      records.forEach(rec => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${rec.employeeId}</td>
          <td>${rec.grossPay.toFixed(2)}</td>
          <td>${rec.taxAmount.toFixed(2)}</td>
          <td>${rec.deductions.toFixed(2)}</td>
          <td>${rec.bonuses.toFixed(2)}</td>
          <td>${rec.netPay.toFixed(2)}</td>
          <td>${new Date(rec.payDate).toLocaleDateString()}</td>
        `;
        payrollTableBody.appendChild(tr);
      });
    }

    // Initial load
    fetchEmployees();
  </script>
</body>
</html>
