# OSCAR BROOME REVENUE - Simplified Kubernetes Deployment
# Minimal configuration for quick deployment and testing

apiVersion: v1
kind: Namespace
metadata:
  name: oscar-broome-simple
  labels:
    environment: development
    app: oscar-broome-revenue

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: oscar-broome-simple
data:
  NODE_ENV: 'development'
  PORT: '3000'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oscar-broome-app
  namespace: oscar-broome-simple
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oscar-broome-revenue
  template:
    metadata:
      labels:
        app: oscar-broome-revenue
    spec:
      containers:
        - name: app
          image: oscar-broome-revenue:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'

---
apiVersion: v1
kind: Service
metadata:
  name: oscar-broome-service
  namespace: oscar-broome-simple
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30000
  selector:
    app: oscar-broome-revenue
