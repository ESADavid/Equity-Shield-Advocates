# OSCAR BROOME REVENUE - Production Kubernetes Deployment
# This configuration deploys the complete application stack to production

apiVersion: v1
kind: Namespace
metadata:
  name: oscar-broome-production
  labels:
    environment: production
    app: oscar-broome-revenue

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: oscar-broome-production
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  ENABLE_MONITORING: "true"
  ENABLE_SECURITY_HEADERS: "true"

---
# Secret for sensitive credentials (to be populated separately)
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: oscar-broome-production
type: Opaque
stringData:
  # Database credentials
  MONGODB_URI: "mongodb://mongodb-service:27017/oscar-broome-production"
  REDIS_URL: "redis://redis-service:6379"
  
  # API Keys (replace with actual values)
  STRIPE_SECRET_KEY: "sk_live_placeholder"
  JPMORGAN_API_KEY: "jpmorgan_placeholder"
  QUICKBOOKS_CLIENT_ID: "quickbooks_placeholder"
  QUICKBOOKS_CLIENT_SECRET: "quickbooks_placeholder"
  PLAID_CLIENT_ID: "plaid_placeholder"
  PLAID_SECRET: "plaid_placeholder"
  
  # Email configuration
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "placeholder@gmail.com"
  SMTP_PASS: "placeholder"
  
  # Twilio configuration
  TWILIO_ACCOUNT_SID: "twilio_placeholder"
  TWILIO_AUTH_TOKEN: "twilio_placeholder"
  TWILIO_PHONE_NUMBER: "+1234567890"
  
  # JWT Secret
  JWT_SECRET: "change-this-in-production-to-secure-random-string"
  
  # Encryption keys
  ENCRYPTION_KEY: "change-this-to-32-byte-key"

---
# Main Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oscar-broome-app
  namespace: oscar-broome-production
  labels:
    app: oscar-broome-revenue
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: oscar-broome-revenue
      component: backend
  template:
    metadata:
      labels:
        app: oscar-broome-revenue
        component: backend
    spec:
      containers:
      - name: app
        image: oscar-broome-revenue:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PORT
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}

---
# Application Service
apiVersion: v1
kind: Service
metadata:
  name: oscar-broome-service
  namespace: oscar-broome-production
  labels:
    app: oscar-broome-revenue
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: oscar-broome-revenue
    component: backend

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oscar-broome-ingress
  namespace: oscar-broome-production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - api.oscarbroome.com
    - oscarbroome.com
    secretName: oscar-broome-tls
  rules:
  - host: api.oscarbroome.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oscar-broome-service
            port:
              number: 80
  - host: oscarbroome.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oscar-broome-service
            port:
              number: 80

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oscar-broome-hpa
  namespace: oscar-broome-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oscar-broome-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oscar-broome-network-policy
  namespace: oscar-broome-production
spec:
  podSelector:
    matchLabels:
      app: oscar-broome-revenue
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - namespaceSelector: {}
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 27017  # MongoDB
    - protocol: TCP
      port: 6379   # Redis
    - protocol: TCP
      port: 443    # HTTPS
    - protocol: TCP
      port: 587    # SMTP
