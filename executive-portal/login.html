<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Executive Revenue Portal - Oscar Broome</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Executive Revenue Portal - Oscar Broome</h1>
            <p>Secure Access to Executive Dashboard</p>
        </header>
        <main>
            <form id="executiveLoginForm" class="login-form">
                <div class="form-group">
                    <label for="executiveEmail">Executive Email</label>
                    <input type="email" id="executiveEmail" name="email" required />
                    <div id="email-error" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="executivePassword">Password</label>
                    <input type="password" id="executivePassword" name="password" required />
                    <div id="password-strength" class="strength-indicator"></div>
                    <div id="password-error" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="mfaCode">2FA Code</label>
                    <input type="text" id="mfaCode" name="two-factor-code" maxlength="6" required />
                    <div id="two-factor-code-error" class="error-message"></div>
                </div>
                <button id="loginBtn" type="submit" class="login-btn">Access Executive Dashboard</button>
            </form>
        </main>
        <footer>
            <p>&copy; 2024 Oscar Broome Revenue Systems. All rights reserved.</p>
        </footer>
    </div>
    <script src="executive-login.js"></script>
</body>
</html>
