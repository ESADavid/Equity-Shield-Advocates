<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar Broome - Executive Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Executive-level secure login portal for Oscar Broome revenue management">
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-crown"></i>
                    <h1>Oscar Broome</h1>
                    <p>Executive Revenue Portal</p>
                </div>
            </div>
            
            <form id="executiveLoginForm" class="login-form">
                <div class="form-group">
                    <label for="executiveEmail">Executive Email</label>
                    <div class="input-group">
                        <i class="fas fa-user-tie"></i>
                        <input type="email" id="executiveEmail" name="email" 
                               placeholder="executive@oscarbroome.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="executivePassword">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="executivePassword" name="password" 
                               placeholder="Enter your secure password" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                
                <div class="form-group">
                    <label for="mfaCode">Two-Factor Code</label>
                    <div class="input-group">
                        <i class="fas fa-mobile-alt"></i>
                        <input type="text" id="mfaCode" name="mfaCode" 
                               placeholder="Enter 6-digit code" maxlength="6" required>
                    </div>
                    <button type="button" class="resend-code" id="resendCode">Resend Code</button>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span class="checkmark"></span>
                        Remember this device for 30 days
                    </label>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Access Executive Dashboard</span>
                    <i class="fas fa-spinner fa-spin" style="display: none;"></i>
                </button>
                
                <div class="login-footer">
                    <a href="#" class="forgot-link">Forgot Password?</a>
                    <a href="#" class="support-link">Executive Support</a>
                </div>
            </form>
            
            <div class="security-notice">
                <i class="fas fa-shield-alt"></i>
                <p>This portal uses enterprise-grade security. All sessions are encrypted and monitored.</p>
            </div>
            
            <div class="login-features">
                <div class="feature">
                    <i class="fas fa-chart-line"></i>
                    <span>Real-time Analytics</span>
                </div>
                <div class="feature">
                    <i class="fas fa-mobile-alt"></i>
                    <span>Mobile Access</span>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <span>Bank-Level Security</span>
                </div>
            </div>
        </div>
        
        <div class="login-background">
            <div class="floating-elements">
                <div class="element" style="--delay: 0s"></div>
                <div class="element" style="--delay: 2s"></div>
                <div class="element" style="--delay: 4s"></div>
            </div>
        </div>
    </div>

    <script src="executive-login.js"></script>
</body>
</html>
