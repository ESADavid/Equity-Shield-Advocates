version: '3.8'

services:
  executive-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oscar-broome-executive-portal
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - executive-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  executive-network:
    driver: bridge
