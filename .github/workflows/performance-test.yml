name: Performance Testing

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 3 AM UTC
  workflow_dispatch:
    inputs:
      duration:
        description: 'Load test duration in seconds'
        required: false
        default: '60'
      concurrency:
        description: 'Number of concurrent users'
        required: false
        default: '10'

jobs:
  performance-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo --eval "db.adminCommand('ping')"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until nc -z localhost 27017; do sleep 1; done'
          timeout 60 bash -c 'until nc -z localhost 6379; do sleep 1; done'

      - name: Start application
        run: |
          npm start &
          # Wait for app to be ready
          timeout 60 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'

      - name: Run load test
        run: |
          node scripts/load-test.js \
            --duration ${{ github.event.inputs.duration || 60 }} \
            --concurrency ${{ github.event.inputs.concurrency || 10 }}

      - name: Generate performance report
        run: node -e "import('./services/performanceMonitor.js').then(pm => pm.saveReport())"

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-results
          path: |
            logs/load-test-results-*.json
            logs/performance-report-*.json

      - name: Performance regression check
        run: |
          # Check if response time exceeds threshold
          if [ -f logs/load-test-results-*.json ]; then
            AVG_TIME=$(jq '.avgResponseTime' logs/load-test-results-*.json 2>/dev/null || echo 0)
            if (( $(echo "$AVG_TIME > 2000" | bc -l 2>/dev/null || echo 0) )); then
              echo "Performance regression detected: Average response time ${AVG_TIME}ms exceeds 2000ms threshold"
              exit 1
            fi
          fi

  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance benchmarks
        run: npm test -- --testPathPattern=performance --testNamePattern="benchmark"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: logs/benchmark-*.json
