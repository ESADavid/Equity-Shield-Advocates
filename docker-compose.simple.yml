# OSCAR BROOME REVENUE - Simplified Docker Compose
# Minimal configuration for local development and testing

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oscar-broome-app-simple
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    command: npm run dev

  mongodb:
    image: mongo:7.0
    container_name: oscar-broome-mongodb-simple
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=oscar-broome-dev
    volumes:
      - mongodb-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: oscar-broome-redis-simple
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

volumes:
  mongodb-data:
    driver: local
